<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{% block title %}Google Auth Demo{% endblock %}</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 760px; margin: 20px auto; line-height: 1.4; }
    nav a { margin-right: 10px; }
    .messages li { margin: 4px 0; }
    .errorlist { color: #b00020; }
    .card { border: 1px solid #ddd; border-radius: 6px; padding: 16px; margin: 12px 0; }
  </style>
</head>
<body>
  <nav>
    {% if user.is_authenticated %}
      <a href="{% url 'accounts:profile' %}">Profile</a>
      <a href="{% url 'accounts:logout' %}">Logout</a>
    {% else %}
      <a href="{% url 'accounts:login' %}">Login</a>
      <a href="{% url 'accounts:register' %}">Register</a>
    {% endif %}
  </nav>

  {% if messages %}
    <ul class="messages">
      {% for message in messages %}
        <li>{{ message }}</li>
      {% endfor %}
    </ul>
  {% endif %}

  {% block content %}{% endblock %}
</body>
</html>
