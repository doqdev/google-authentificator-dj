{% extends "base.html" %}
{% block title %}2FA Challenge{% endblock %}
{% block content %}
  <h1>2FA verification</h1>
  <p>User: <strong>{{ user.username }}</strong></p>
  <div class="card">
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit">Verify code</button>
    </form>
  </div>
{% endblock %}
